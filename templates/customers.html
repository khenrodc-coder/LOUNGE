<!DOCTYPE html>
<html lang="en" class="transition duration-300">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUNGE Customer Management</title>

<script src="https://cdn.tailwindcss.com"></script>
<script> tailwind.config = { darkMode: 'class' } </script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{ font-family:'DM Sans',sans-serif; overflow-x:hidden; }
h1,h2,h3{ font-family:'Poppins',sans-serif; }
.glass{ background: rgba(255,255,255,0.25); backdrop-filter: blur(18px); border: 1px solid rgba(255,255,255,0.3); transition: box-shadow 0.3s, transform 0.3s;}
.glass:hover{ box-shadow: 0 0 20px rgba(255,255,255,0.5); transform: translateY(-3px);}
.dark .glass{ background: rgba(30,41,59,0.35); border: 1px solid rgba(255,255,255,0.08);}
.bubbles{ position: fixed; inset: 0; overflow: hidden; z-index: 0; pointer-events: none;}
.bubble{ position: absolute; bottom: -150px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.2) 60%, transparent 70%); animation: floatUp linear infinite; opacity: 0.6;}
@keyframes floatUp{0%{ transform: translateY(0) scale(1); opacity:0;}10%{opacity:0.6;}90%{opacity:0.6;}100%{transform: translateY(-120vh) scale(1.2); opacity:0;}}
</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-green-400 via-blue-500 to-indigo-600 dark:from-gray-900 dark:via-gray-800 dark:to-black transition duration-500">

<div class="bubbles" id="bubbles"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 glass p-6 text-white z-40 transform -translate-x-full transition-transform duration-300 flex flex-col justify-between">
  <div>
    <div class="flex items-center justify-between mb-10">
      <h1 class="text-2xl font-bold">LOUNGE</h1>
      <button id="closeSidebar" class="p-2 rounded-lg hover:bg-white/20 transition">✖</button>
    </div>
    <nav class="space-y-3">
      <a href="{{ url_for('dashboard') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Dashboard</a>
      <a href="{{ url_for('orders') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Orders</a>
      <a href="{{ url_for('customers') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Customers</a>
      <a href="{{ url_for('reports') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Reports</a>
      <a href="{{ url_for('settings') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Settings</a>
    </nav>
  </div>
  <div class="mt-10 flex flex-col gap-2">
    <p class="text-sm opacity-80">{{ user }}</p>
    <p class="text-xs opacity-60">admin@laundry.com</p>
    <a href="{{ url_for('logout') }}" class="mt-3 block px-4 py-2 rounded-xl bg-red-500 hover:bg-red-400 text-white text-sm text-center transition">Log Out</a>
  </div>
</aside>

<div id="overlay" class="fixed inset-0 bg-black/40 hidden z-30"></div>

<!-- MAIN -->
<div class="relative z-10 p-6 text-white">
  <div class="flex justify-between items-center mb-8">
    <button id="openSidebar" class="p-3 rounded-xl bg-white/20 hover:bg-white/30 transition">☰</button>
    <button onclick="toggleDark()" class="px-5 py-2 rounded-full bg-white/20 hover:bg-white/30 transition">🌙</button>
  </div>

  <div class="mb-8">
    <h2 class="text-3xl font-bold">Customers Management</h2>
    <p class="text-white/70 text-sm mt-2">View all customer information.</p>
  </div>

  <div class="flex flex-col sm:flex-row justify-between mb-4 gap-2">
    <input type="text" id="searchCustomer" placeholder="Search customers..." class="px-4 py-2 rounded-xl text-black w-full sm:w-1/3">
  </div>

  <!-- Desktop Table -->
  <div class="glass p-6 rounded-2xl shadow-lg overflow-x-auto hidden sm:block">
    <table class="min-w-full text-left table-auto">
      <thead>
        <tr class="border-b border-white/30">
          <th class="px-4 py-2">Order ID</th>
          <th class="px-4 py-2">Name</th>
          <th class="px-4 py-2">Phone</th>
          <th class="px-4 py-2">Total Spent</th>
          <th class="px-4 py-2">Last Order</th>
          <th class="px-4 py-2">Status</th>
        </tr>
      </thead>
      <tbody id="customerTbody"></tbody>
    </table>
    <p id="emptyState" class="text-center text-white/70 mt-6 hidden">No customers yet.</p>
  </div>

  <!-- Mobile Cards -->
  <div class="sm:hidden flex flex-col gap-4" id="mobileCustomerCards"></div>
</div>

<script>
// Dark Mode
function toggleDark() {
  document.documentElement.classList.toggle('dark');
  localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}
if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');}

// Sidebar
const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('overlay');
openSidebar.onclick=()=>{sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden');}
closeSidebar.onclick=()=>{sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden');}
overlay.onclick=()=>{sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden');}

// Bubble generator
setInterval(()=>{
  const bubble=document.createElement('div');
  bubble.className='bubble';
  const size=Math.random()*60+20;
  bubble.style.width=size+'px';
  bubble.style.height=size+'px';
  bubble.style.left=Math.random()*100+'vw';
  bubble.style.animationDuration=(Math.random()*10+12)+'s';
  document.getElementById('bubbles').appendChild(bubble);
  setTimeout(()=>bubble.remove(),20000);
},700);

// -------------------
// Fetch customers from API
// -------------------
async function fetchCustomers() {
    try {
        const res = await fetch('/api/customers'); // should return [{orderId,name,phone,spent,lastOrder,status}]
        if(!res.ok) throw new Error("Failed to fetch customers");
        return await res.json();
    } catch(err) {
        console.error(err);
        return [];
    }
}

async function renderCustomers() {
    const customers = await fetchCustomers();
    const tbody = document.getElementById('customerTbody');
    const mobile = document.getElementById('mobileCustomerCards');
    const empty = document.getElementById('emptyState');

    tbody.innerHTML = '';
    mobile.innerHTML = '';
    empty.classList.toggle('hidden', customers.length !== 0);

    customers.forEach(c => {
        tbody.innerHTML += `
<tr>
<td class="px-4 py-2">${c.orderId}</td>
<td class="px-4 py-2">${c.name}</td>
<td class="px-4 py-2">${c.phone}</td>
<td class="px-4 py-2">₱${parseFloat(c.spent).toFixed(2)}</td>
<td class="px-4 py-2">${c.lastOrder}</td>
<td class="px-4 py-2"><span class="px-2 py-1 rounded-full bg-green-200 text-green-800 text-sm">${c.status}</span></td>
</tr>`;

        mobile.innerHTML += `
<div class="glass p-4 rounded-xl">
<h3 class="font-bold">Order ID: ${c.orderId}</h3>
<p>Name: ${c.name}</p>
<p>Phone: ${c.phone}</p>
<p>Total Spent: ₱${parseFloat(c.spent).toFixed(2)}</p>
<p>Last Order: ${c.lastOrder}</p>
<p>Status: <span class="px-2 py-1 rounded-full bg-green-200 text-green-800 text-sm">${c.status}</span></p>
</div>`;
    });
}

// Search
searchCustomer.oninput = () => {
    const value = searchCustomer.value.toLowerCase();
    document.querySelectorAll('#customerTbody tr').forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(value) ? '' : 'none';
    });
    document.querySelectorAll('#mobileCustomerCards .glass').forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(value) ? '' : 'none';
    });
};

// Initial render + auto-refresh
renderCustomers();
setInterval(renderCustomers, 10000); // refresh every 10s
</script>
</body>
</html>
