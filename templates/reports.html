<!DOCTYPE html>
<html lang="en" class="transition duration-300">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUNGE Reports & Sales Monitoring</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script> tailwind.config = { darkMode: 'class' } </script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{ font-family:'DM Sans',sans-serif; overflow-x:hidden; }
h1,h2,h3{ font-family:'Poppins',sans-serif; }

/* Glass Effect */
.glass{
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.3);
    transition: box-shadow 0.3s, transform 0.3s;
}
.glass:hover{
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
    transform: translateY(-3px);
}
.dark .glass{
    background: rgba(30,41,59,0.35);
    border: 1px solid rgba(255,255,255,0.08);
}

/* Bubble Background */
.bubbles{
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}
.bubble{
    position: absolute;
    bottom: -150px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.2) 60%, transparent 70%);
    animation: floatUp linear infinite;
    opacity: 0.6;
    backdrop-filter: blur(4px);
}
@keyframes floatUp{
    0%{ transform: translateY(0) scale(1); opacity: 0; }
    10%{ opacity: 0.6; }
    90%{ opacity: 0.6; }
    100%{ transform: translateY(-120vh) scale(1.2); opacity: 0; }
}

/* Decorative Lines & Circles */
.decorative-line { position:absolute;width:2px;height:150px;background:linear-gradient(to bottom, rgba(255,255,255,0.5), transparent); transform:rotate(25deg); opacity:0.3; z-index:0; pointer-events:none; }
.decorative-line.reverse{ transform:rotate(-25deg); }
.decorative-circle{ position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.1); box-shadow:0 0 20px rgba(255,255,255,0.2); z-index:0; pointer-events:none; }
</style>
</head>

<body class="min-h-screen bg-gradient-to-br from-green-400 via-blue-500 to-indigo-600 dark:from-gray-900 dark:via-gray-800 dark:to-black transition duration-500">

<!-- Bubbles -->
<div class="bubbles" id="bubbles"></div>

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 glass p-6 text-white z-40 transform -translate-x-full transition-transform duration-300 flex flex-col justify-between">
  <div>
    <div class="flex items-center justify-between mb-10">
      <h1 class="text-2xl font-bold">LOUNGE</h1>
      <button id="closeSidebar" class="p-2 rounded-lg hover:bg-white/20 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <nav class="space-y-3">
      <a href="{{ url_for('dashboard') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Dashboard</a>
      <a href="{{ url_for('orders') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Orders</a>
      <a href="{{ url_for('customers') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Customers</a>
      <a href="{{ url_for('reports') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Reports</a>
      <a href="{{ url_for('settings') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Settings</a>
    </nav>
  </div>
  <div class="mt-10 flex flex-col gap-2">
    <p class="text-sm opacity-80">{{ user }}</p>
    <p class="text-xs opacity-60">admin@laundry.com</p>
    <a href="{{ url_for('logout') }}" class="mt-3 block px-4 py-2 rounded-xl bg-red-500 hover:bg-red-400 text-white text-sm text-center transition">Log Out</a>
  </div>
</aside>

<div id="overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-30"></div>

<!-- MAIN CONTENT -->
<div class="relative z-10 p-4 sm:p-6 md:p-8 text-white transition-all duration-300">

<div class="flex justify-between items-center mb-8">
<button id="openSidebar" class="p-3 rounded-xl bg-white/20 hover:bg-white/30 transition">☰</button>
<button onclick="toggleDark()" class="px-5 py-2 rounded-full bg-white/20 hover:bg-white/30 transition">🌙</button>
</div>

<div class="mb-6">
<h2 class="text-3xl font-bold">Reports & Sales Monitoring</h2>
<p class="text-white/70 text-sm mt-2">View sales and service reports</p>
</div>

<!-- REPORT SELECTION -->
<div class="glass p-4 rounded-2xl mb-6">
<label class="block mb-2 font-semibold">Select Report Type:</label>
<select id="reportType" class="px-4 py-2 rounded-xl w-full sm:w-1/3 text-black focus:outline-none focus:ring-2 focus:ring-blue-400">
  <option value="daily">Daily Sales</option>
  <option value="weekly">Weekly Sales</option>
  <option value="monthly">Monthly Sales</option>
  <option value="popularity">Service Popularity</option>
</select>
</div>

<!-- REPORT CHART -->
<div class="glass p-6 rounded-2xl shadow-lg mb-6">
<canvas id="reportChart" class="w-full h-64"></canvas>
</div>

<!-- TRANSACTION SUMMARY -->
<div class="glass p-6 rounded-2xl shadow-lg">
<h3 class="text-xl font-bold mb-4">Transaction Summary</h3>
<div id="transactionSummary" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>

</div>

<script>
// ------------------ Sidebar ------------------
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('openSidebar').onclick = () => {
    sidebar.classList.remove('-translate-x-full'); 
    overlay.classList.remove('hidden');
};
document.getElementById('closeSidebar').onclick = () => {
    sidebar.classList.add('-translate-x-full'); 
    overlay.classList.add('hidden');
};
overlay.onclick = () => {
    sidebar.classList.add('-translate-x-full'); 
    overlay.classList.add('hidden');
};

// ------------------ Dark Mode ------------------
function toggleDark() {
    document.documentElement.classList.toggle('dark'); 
    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}
if(localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
}

// ------------------ Bubble Generator ------------------
function createBubbles(count=30){
    const container = document.getElementById('bubbles');
    for(let i=0;i<count;i++){
        const bubble = document.createElement('div');
        bubble.classList.add('bubble');
        bubble.style.width = bubble.style.height = `${Math.random()*80 + 20}px`;
        bubble.style.left = `${Math.random()*100}%`;
        bubble.style.animationDuration = `${Math.random()*10 + 5}s`;
        bubble.style.animationDelay = `${Math.random()*5}s`;
        container.appendChild(bubble);
    }
}
createBubbles();

// ------------------ Fetch Reports ------------------
let reportChart = new Chart(document.getElementById('reportChart').getContext('2d'), {
    type:'bar',
    data:{ labels:[], datasets:[{label:'Amount', data:[], backgroundColor:'#3b82f6'}] },
    options:{ responsive:true, plugins:{legend:{display:false}} }
});

async function fetchReports() {
    try {
        const res = await fetch('/api/reports/live');
        const liveReports = await res.json();

        // Automatically populate the chart based on selected type
        const type = document.getElementById('reportType').value;
        const report = liveReports[type]; 
        if(!report) return;

        reportChart.data.labels = report.labels;
        reportChart.data.datasets[0].data = report.data;
        reportChart.update();

        const summaryContainer = document.getElementById('transactionSummary');
        summaryContainer.innerHTML = '';
        report.labels.forEach((label,i)=>{
            const div = document.createElement('div');
            div.className = 'glass p-4 rounded-xl';
            div.innerHTML = `<p class="font-semibold">${label}</p><p class="text-lg">₱${report.data[i]}</p>`;
            summaryContainer.appendChild(div);
        });

    } catch(err){ console.error(err); }
}

// ------------------ Initialize ------------------
fetchReports();
</script>
</body>
</html>
