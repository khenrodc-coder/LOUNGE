<!DOCTYPE html>
<html lang="en" class="transition duration-300">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOUNGE Admin Settings</title>

<script src="https://cdn.tailwindcss.com"></script>
<script> tailwind.config = { darkMode: 'class' } </script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{ font-family:'DM Sans',sans-serif; overflow-x:hidden; }
h1,h2,h3{ font-family:'Poppins',sans-serif; }

/* Glass Effect */
.glass{
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.3);
    transition: box-shadow 0.3s, transform 0.3s;
}
.glass:hover{
    box-shadow: 0 0 20px rgba(255,255,255,0.5);
    transform: translateY(-3px);
}
.dark .glass{
    background: rgba(30,41,59,0.35);
    border: 1px solid rgba(255,255,255,0.08);
}

/* Bubble Background */
.bubbles{
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
}
.bubble{
    position: absolute;
    bottom: -150px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.4) 40%, rgba(255,255,255,0.2) 60%, transparent 70%);
    animation: floatUp linear infinite;
    opacity: 0.6;
    backdrop-filter: blur(4px);
}
@keyframes floatUp{
    0%{ transform: translateY(0) scale(1); opacity: 0; }
    10%{ opacity: 0.6; }
    90%{ opacity: 0.6; }
    100%{ transform: translateY(-120vh) scale(1.2); opacity: 0; }
}

/* Decorative Lines & Circles */
.decorative-line { position: absolute; width: 2px; height: 150px; background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent); transform: rotate(25deg); opacity:0.3; z-index:0; pointer-events:none; }
.decorative-line.reverse { transform: rotate(-25deg); }
.decorative-circle { position:absolute; width:100px; height:100px; border-radius:50%; background:rgba(255,255,255,0.1); box-shadow:0 0 20px rgba(255,255,255,0.2); z-index:0; pointer-events:none; }
</style>
</head>

<body class="min-h-screen bg-gradient-to-br from-green-400 via-blue-500 to-indigo-600 dark:from-gray-900 dark:via-gray-800 dark:to-black transition duration-500">

<!-- Bubbles -->
<div class="bubbles" id="bubbles"></div>

<!-- Sidebar -->
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 glass p-6 text-white z-40 transform -translate-x-full transition-transform duration-300 flex flex-col justify-between">
<div>
<div class="flex items-center justify-between mb-10">
<h1 class="text-2xl font-bold">LOUNGE</h1>
<button id="closeSidebar" class="p-2 rounded-lg hover:bg-white/20 transition">
<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
</svg>
</button>
</div>

<nav class="space-y-3">
      <a href="{{ url_for('dashboard') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Dashboard</a>
      <a href="{{ url_for('orders') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Orders</a>
      <a href="{{ url_for('customers') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Customers</a>
      <a href="{{ url_for('reports') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Reports</a>
      <a href="{{ url_for('settings') }}" class="block px-4 py-3 rounded-xl hover:bg-white/20 transition">Settings</a>
</nav>
</div>
<div class="mt-10 flex flex-col gap-2">
    <p class="text-sm opacity-80" id="adminUser">{{ user }}</p>
    <p class="text-xs opacity-60">admin@laundry.com</p>
    <a href="{{ url_for('logout') }}" class="mt-3 block px-4 py-2 rounded-xl bg-red-500 hover:bg-red-400 text-white text-sm text-center transition">Log Out</a>
</div>
</aside>

<div id="overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-30"></div>

<!-- MAIN CONTENT -->
<div class="relative z-10 p-4 sm:p-6 md:p-8 text-white transition-all duration-300">

<div class="decorative-line" style="top:50px; left:20%;"></div>
<div class="decorative-line reverse" style="top:200px; left:65%;"></div>
<div class="decorative-circle" style="top:150px; left:10%;"></div>
<div class="decorative-circle" style="top:300px; left:75%; width:150px; height:150px;"></div>

<div class="flex justify-between items-center mb-8">
<button id="openSidebar" class="p-3 rounded-xl bg-white/20 hover:bg-white/30 transition">
<svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
</svg>
</button>
<button onclick="toggleDark()" class="px-5 py-2 rounded-full bg-white/20 hover:bg-white/30 transition">🌙</button>
</div>

<div class="mb-6">
<h2 class="text-3xl font-bold">Admin Settings</h2>
<p class="text-white/70 text-sm mt-2">Manage your admin preferences</p>
</div>

<!-- SETTINGS CARDS -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

  <!-- Change Password -->
  <div class="glass p-6 rounded-2xl shadow-lg">
    <h3 class="text-2xl font-bold mb-4 text-white">Change Password</h3>
    <form id="changePasswordForm" class="flex flex-col gap-3 text-black">
      <input id="currentPassword" type="password" placeholder="Current Password" class="px-4 py-2 rounded-xl focus:outline-none" required>
      <input id="newPassword" type="password" placeholder="New Password" class="px-4 py-2 rounded-xl focus:outline-none" required>
      <input id="confirmPassword" type="password" placeholder="Confirm New Password" class="px-4 py-2 rounded-xl focus:outline-none" required>
      <button type="submit" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-400 transition">Update Password</button>
    </form>
  </div>

  <!-- Profile Info -->
  <div class="glass p-6 rounded-2xl shadow-lg">
    <h3 class="text-2xl font-bold mb-4 text-white">Profile Info</h3>
    <form id="updateProfileForm" class="flex flex-col gap-3 text-black">
      <input id="fullName" type="text" placeholder="Full Name" class="px-4 py-2 rounded-xl focus:outline-none">
      <input id="username" type="text" placeholder="Username" class="px-4 py-2 rounded-xl focus:outline-none">
      <button type="submit" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-400 transition">Update Profile</button>
    </form>
  </div>

  <!-- Notifications -->
  <div class="glass p-6 rounded-2xl shadow-lg">
    <h3 class="text-2xl font-bold mb-4 text-white">Notifications</h3>
    <div class="flex flex-col gap-3 text-black">
      <label class="flex items-center gap-3">
        <input id="emailNotif" type="checkbox" class="accent-blue-500"> Email Notifications
      </label>
      <label class="flex items-center gap-3">
        <input id="smsNotif" type="checkbox" class="accent-blue-500"> SMS Notifications
      </label>
      <button id="updateNotif" class="mt-4 px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-400 transition">Save Settings</button>
    </div>
  </div>

  <!-- Activity Log -->
  <div class="glass p-6 rounded-2xl shadow-lg flex flex-col justify-between">
    <h3 class="text-2xl font-bold mb-4 text-white">Activity Log</h3>
    <ul id="activityLog" class="text-white/70 text-sm mb-4 max-h-48 overflow-y-auto"></ul>
    <button id="viewLogBtn" class="px-4 py-2 bg-blue-500 text-white rounded-xl hover:bg-blue-400 transition">Refresh Log</button>
  </div>

</div>
</div>

<script>
// ------------------ Bubble Generator ------------------
const bubbleContainer = document.getElementById('bubbles');
function createBubble(){
    const bubble = document.createElement('div');
    bubble.classList.add('bubble');
    const size = Math.random()*60+20;
    bubble.style.width=size+'px';
    bubble.style.height=size+'px';
    bubble.style.left=Math.random()*100+'vw';
    bubble.style.animationDuration=(Math.random()*10+12)+'s';
    bubble.style.animationDelay=Math.random()*5+'s';
    bubbleContainer.appendChild(bubble);
    setTimeout(()=>bubble.remove(),20000);
}
setInterval(createBubble,700);

// ------------------ Sidebar ------------------
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('openSidebar').onclick = () => {sidebar.classList.remove('-translate-x-full'); overlay.classList.remove('hidden');};
document.getElementById('closeSidebar').onclick = () => {sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden');};
overlay.onclick = () => {sidebar.classList.add('-translate-x-full'); overlay.classList.add('hidden');};

// ------------------ Dark Mode ------------------
function toggleDark(){
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', document.documentElement.classList.contains('dark')?'dark':'light');
}
if(localStorage.getItem('theme')==='dark'){document.documentElement.classList.add('dark');}

// ------------------ Admin Settings Fetch ------------------
async function fetchNotifications(){
    const res = await fetch('/api/admin/notifications');
    const data = await res.json();
    document.getElementById('emailNotif').checked = data.email;
    document.getElementById('smsNotif').checked = data.sms;
}
async function fetchActivityLog(){
    const res = await fetch('/api/admin/log');
    const data = await res.json();
    const ul = document.getElementById('activityLog');
    ul.innerHTML = '';
    data.slice().reverse().forEach(item=>{
        const li = document.createElement('li');
        li.textContent = item;
        ul.appendChild(li);
    });
}
fetchNotifications();
fetchActivityLog();

// ------------------ Form Submissions ------------------
document.getElementById('changePasswordForm').onsubmit = async (e)=>{
    e.preventDefault();
    const current = document.getElementById('currentPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const res = await fetch('/api/admin/change_password',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({current,new:newPass,confirm})
    });
    const data = await res.json();
    alert(data.message || data.error);
    if(data.message) { fetchActivityLog(); e.target.reset(); }
};

document.getElementById('updateProfileForm').onsubmit = async (e)=>{
    e.preventDefault();
    const full_name = document.getElementById('fullName').value;
    const username = document.getElementById('username').value;
    const res = await fetch('/api/admin/update_profile',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({full_name,username})
    });
    const data = await res.json();
    alert(data.message || data.error);
    if(data.user) { document.getElementById('adminUser').textContent = data.user; fetchActivityLog(); }
};

document.getElementById('updateNotif').onclick = async ()=>{
    const email = document.getElementById('emailNotif').checked;
    const sms = document.getElementById('smsNotif').checked;
    const res = await fetch('/api/admin/notifications',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({email,sms})
    });
    const data = await res.json();
    alert(data.message || data.error);
    fetchActivityLog();
};

document.getElementById('viewLogBtn').onclick = fetchActivityLog;
</script>

</body>
</html>
